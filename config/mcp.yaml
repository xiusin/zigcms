# ZigCMS MCP 服务器配置
# Model Context Protocol 配置文件

# 服务基本信息
name: "ZigCMS_MCP"
version: "v1.0.0"
enabled: true

# 传输层配置
transport:
  # 传输类型: sse (Server-Sent Events) 或 stdio (标准输入输出)
  type: "sse"
  
  # 监听地址（注意：MCP 路由注册到主 HTTP 服务器，实际使用 API 配置的地址和端口）
  host: "127.0.0.1"
  
  # 监听端口（注意：此端口配置已废弃，MCP 使用主 HTTP 服务器端口，见 config/api.yaml）
  port: 8889
  
  # SSE 端点路径
  sse_path: "/mcp/sse"
  
  # 消息端点路径
  message_path: "/mcp/message"
  
  # 心跳间隔（秒）
  heartbeat_interval: 30

# 安全配置
security:
  # 允许访问的路径（相对于项目根目录）
  allowed_paths:
    - "src/"
    - "docs/"
    - "knowlages/"
    - "tests/"
    - "examples/"
  
  # 禁止访问的路径
  forbidden_paths:
    - ".git/"
    - ".env"
    - "config/secrets/"
    - "node_modules/"
    - "zig-cache/"
    - "zig-out/"
  
  # 允许的文件扩展名
  allowed_extensions:
    - ".zig"
    - ".md"
    - ".yaml"
    - ".json"
    - ".toml"
    - ".sql"
    - ".txt"
  
  # 最大文件大小（字节）10MB
  max_file_size: 10485760

# 工具配置
tools:
  # 启用的工具列表
  enabled:
    - "project_structure"  # 项目结构分析
    - "file_search"        # 文件搜索
    - "file_read"          # 文件读取
    - "generate_crud"      # CRUD 生成器
    - "generate_model"     # 模型生成器
    - "generate_migration" # 迁移生成器
    - "generate_test"      # 测试生成器

# 日志配置
logging:
  # 日志级别: debug, info, warn, error
  level: "info"
  
  # 日志输出: stdout, file
  output: "stdout"
  
  # 日志文件路径（当 output 为 file 时）
  file_path: "logs/mcp.log"

# 性能配置
performance:
  # 最大并发连接数
  max_connections: 100
  
  # 请求超时（秒）
  request_timeout: 30
  
  # 缓存大小（MB）
  cache_size: 100
